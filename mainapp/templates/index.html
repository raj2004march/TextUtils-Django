<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TextUtils.com</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">TextUtils.com</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/about">About Us</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/contact">Contact Us</a>
            </li>
          </ul>
          <form class="d-flex" action = '/search' method = 'get' role="search"> {% csrf_token %}
            <input class="form-control me-2" type="search" name="search" placeholder="Search" aria-label="Search"/>
            <button class="btn btn-outline-success" type="submit">Search</button>
          </form>
        </div>
      </div>
    </nav>

    <div class="alert alert-info alert-dismissible fade show" role="alert">
      <strong>Welcome to TextUtils!</strong> You Can Do Anything With Your Text Here.
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class = "container">
      <form action='/analyzer' method='post'> {% csrf_token %}

        <label for="exampleFormControlTextarea1" class="form-label">Enter Your Text Area</label>
        <textarea class="form-control" name = 'text' id="exampleFormControlTextarea1" rows="9"></textarea>

        <div class="form-check form-switch mt-2">
          <input class="form-check-input" type="checkbox" name="clearpunc" role="switch" id="switchCheckDefault1">
          <label class="form-check-label" for="switchCheckDefault1">clear the Punctuations</label>
        </div>

        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" name="fullcaps" role="switch" id="switchCheckDefault2">
          <label class="form-check-label" for="switchCheckDefault2">Capitalize the Character</label>
        </div>

        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" name="newlineremover" role="switch" id="switchCheckDefault3">
          <label class="form-check-label" for="switchCheckDefault3">New Line Remover</label>
        </div>

        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" name="extraspaceremover" role="switch" id="switchCheckDefault4">
          <label class="form-check-label" for="switchCheckDefault4">Remove The Extra Space</label>
        </div>
        <button type="submit" class="btn btn-success mt-2 btn-sm">Analyze Text</button>

      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
